<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6d46b" />
  <meta name="description" content="情侶共同記帳系統" />
  <title>情侶共同記帳</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Couple Expense</p>
      <h1>情侶共同記帳</h1>
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換到龍模式" title="切換到龍模式">切換到龍模式</button>
  </header>

  <main class="app-shell">
    <section class="panel hero-panel">
      <div class="hero-copy">
        <span id="themeBadge" class="badge">卡皮巴拉模式</span>
        <h2 id="themeTitle">柔柔地一起記帳</h2>
        <p id="themeDescription" class="muted">淺紫和淺黃色的療癒帳本，把共同花費整理得輕鬆一點。</p>
      </div>
      <img id="modeIllustration" class="mode-illustration" src="assets/illustrations/capybara-mode.png?v=3" alt="可愛卡皮巴拉插圖" />
    </section>

    <section class="panel auth-panel">
      <div>
        <h2>共同帳本</h2>
        <p id="userInfo" class="muted">請先使用 Google 登入</p>
      </div>
      <div class="auth-actions">
        <button id="loginBtn" class="primary-button" type="button">Google 登入</button>
        <button id="logoutBtn" class="secondary-button hidden" type="button">登出</button>
      </div>
    </section>

    <section id="appArea" class="workspace hidden" aria-live="polite">
      <section class="panel entry-panel">
        <div class="section-heading">
          <h2>新增支出</h2>
          <span class="badge">共同花費</span>
        </div>

        <form id="expenseForm" class="expense-form">
          <label>
            <span>日期</span>
            <input id="date" name="date" type="date" required />
          </label>

          <label>
            <span>金額</span>
            <input id="amount" name="amount" type="number" inputmode="decimal" min="1" step="1" placeholder="0" required />
          </label>

          <label>
            <span>類別</span>
            <select id="category" name="category" required>
              <option value="餐飲">餐飲</option>
              <option value="交通">交通</option>
              <option value="日用品">日用品</option>
              <option value="生活用品">生活用品</option>
              <option value="娛樂">娛樂</option>
              <option value="醫療">醫療</option>
              <option value="住宿">住宿</option>
              <option value="其他">其他</option>
            </select>
          </label>

          <label>
            <span>付款人</span>
            <select id="payer" name="payer" required>
              <option value="龍">龍</option>
              <option value="卡皮巴拉">卡皮巴拉</option>
            </select>
          </label>

          <label class="full-width">
            <span>付款錢包</span>
            <select id="walletId" name="walletId" required>
              <option value="">請先新增錢包</option>
            </select>
          </label>

          <label class="full-width">
            <span>備註</span>
            <input id="note" name="note" type="text" maxlength="80" placeholder="晚餐、車票、生活用品..." />
          </label>

          <button id="addBtn" class="primary-button full-width" type="submit">新增支出</button>
        </form>
      </section>

      <section class="panel wallet-panel">
        <div class="section-heading">
          <h2>共同錢包</h2>
          <button id="createDefaultWalletsBtn" class="secondary-button compact-button" type="button">建立預設錢包</button>
        </div>

        <p id="walletStatus" class="status-message hidden" role="status"></p>
        <div id="walletList" class="wallet-list"></div>

        <form id="walletForm" class="expense-form wallet-form">
          <label>
            <span>錢包名稱</span>
            <input id="walletName" type="text" maxlength="30" placeholder="例如：龍的現金" required />
          </label>

          <label>
            <span>擁有者</span>
            <select id="walletOwner" required>
              <option value="龍">龍</option>
              <option value="卡皮巴拉">卡皮巴拉</option>
              <option value="共同">共同</option>
            </select>
          </label>

          <label>
            <span>初始餘額</span>
            <input id="walletInitialBalance" type="number" inputmode="decimal" step="1" value="0" required />
          </label>

          <button id="walletSubmitBtn" class="primary-button" type="submit">新增錢包</button>
        </form>

        <form id="walletTransactionForm" class="expense-form wallet-form">
          <label>
            <span>交易類型</span>
            <select id="walletTransactionType" required>
              <option value="income">收入</option>
              <option value="transfer">轉帳</option>
              <option value="adjustment">調整餘額</option>
            </select>
          </label>

          <label>
            <span>來源錢包</span>
            <select id="transactionWalletId" required>
              <option value="">請先新增錢包</option>
            </select>
          </label>

          <label id="toWalletField">
            <span>目標錢包</span>
            <select id="transactionToWalletId">
              <option value="">請選擇目標錢包</option>
            </select>
          </label>

          <label>
            <span id="walletTransactionAmountLabel">金額</span>
            <input id="walletTransactionAmount" type="number" inputmode="decimal" step="1" min="0" required />
          </label>

          <label>
            <span>日期</span>
            <input id="walletTransactionDate" type="date" required />
          </label>

          <label>
            <span>備註</span>
            <input id="walletTransactionNote" type="text" maxlength="80" placeholder="薪水、轉帳、校正..." />
          </label>

          <button class="primary-button full-width" type="submit">新增錢包交易</button>
        </form>

        <div>
          <h3>錢包流水</h3>
          <div id="walletTransactionList" class="wallet-transaction-list"></div>
        </div>

        <section class="budget-section">
          <div class="section-heading">
            <h2>預算規劃</h2>
            <span class="badge">依支出紀錄計算</span>
          </div>

          <p id="budgetStatus" class="status-message hidden" role="status"></p>
          <div id="budgetList" class="budget-list"></div>

          <form id="budgetForm" class="expense-form wallet-form">
            <input id="budgetId" type="hidden" />

            <label>
              <span>預算名稱</span>
              <input id="budgetName" type="text" maxlength="30" placeholder="例如：六月生活費" required />
            </label>

            <label>
              <span>預算金額</span>
              <input id="budgetAmount" type="number" inputmode="decimal" min="1" step="1" required />
            </label>

            <label>
              <span>開始日期</span>
              <input id="budgetStartDate" type="date" required />
            </label>

            <label>
              <span>結束日期</span>
              <input id="budgetEndDate" type="date" required />
            </label>

            <label class="full-width">
              <span>套用錢包</span>
              <select id="budgetWalletIds" multiple required></select>
            </label>

            <div class="dialog-actions full-width">
              <button id="cancelBudgetEditBtn" class="secondary-button hidden" type="button">取消編輯</button>
              <button id="budgetSubmitBtn" class="primary-button" type="submit">新增預算</button>
            </div>
          </form>
        </section>
      </section>

      <section class="panel stats-panel">
        <div class="section-heading">
          <h2>錢包統計</h2>
          <label class="month-control">
            <span>月份</span>
            <input id="monthFilter" type="month" />
          </label>
        </div>

        <div class="summary-grid">
          <article class="summary-card">
            <span>總支出</span>
            <strong id="monthlyTotal">NT$ 0</strong>
          </article>
          <article class="summary-card">
            <span>支出最高錢包</span>
            <strong id="topWalletTotal">無</strong>
          </article>
          <article class="summary-card">
            <span>使用錢包數</span>
            <strong id="walletCountTotal">0</strong>
          </article>
        </div>

        <div class="chart-layout">
          <div class="chart-box">
            <canvas id="categoryChart" width="280" height="280" aria-label="分類圓餅圖"></canvas>
            <p id="chartEmpty" class="empty-chart">這個月份還沒有資料</p>
          </div>
          <div>
            <h3>錢包分布</h3>
            <div id="categoryStats" class="category-list"></div>
          </div>
        </div>
      </section>

      <section class="panel list-panel">
        <div class="section-heading">
          <h2>支出紀錄</h2>
          <span id="recordCount" class="badge">0 筆</span>
        </div>
        <div id="expenseList" class="expense-list"></div>
      </section>
    </section>
  </main>

  <dialog id="editDialog" class="edit-dialog">
    <form id="editForm" class="expense-form dialog-card" method="dialog">
      <div class="section-heading full-width">
        <h2>編輯支出</h2>
        <button id="closeEditBtn" class="icon-button" type="button" aria-label="關閉編輯視窗" title="關閉">×</button>
      </div>

      <input id="editId" type="hidden" />

      <label>
        <span>日期</span>
        <input id="editDate" type="date" required />
      </label>

      <label>
        <span>金額</span>
        <input id="editAmount" type="number" inputmode="decimal" min="1" step="1" required />
      </label>

      <label>
        <span>類別</span>
        <select id="editCategory" required>
          <option value="餐飲">餐飲</option>
          <option value="交通">交通</option>
          <option value="日用品">日用品</option>
          <option value="生活用品">生活用品</option>
          <option value="娛樂">娛樂</option>
          <option value="醫療">醫療</option>
          <option value="住宿">住宿</option>
          <option value="其他">其他</option>
        </select>
      </label>

      <label>
        <span>付款人</span>
        <select id="editPayer" required>
          <option value="龍">龍</option>
          <option value="卡皮巴拉">卡皮巴拉</option>
        </select>
      </label>

      <label class="full-width">
        <span>付款錢包</span>
        <select id="editWalletId" required>
          <option value="">請先新增錢包</option>
        </select>
      </label>

      <label class="full-width">
        <span>備註</span>
        <input id="editNote" type="text" maxlength="80" />
      </label>

      <div class="dialog-actions full-width">
        <button id="cancelEditBtn" class="secondary-button" type="button">取消</button>
        <button class="primary-button" type="submit">儲存變更</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
